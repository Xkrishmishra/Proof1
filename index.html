<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Proof Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1220;
    --surface:#121B2E;
    --surface-2:#0E1626;
    --line:#22304A;
    --text:#E8ECF1;
    --muted:#8592A6;
    --amber:#F2A93B;
    --cyan:#4FB0C6;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse at top, rgba(79,176,198,0.08), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--cyan);}

  /* ===== HEADER ===== */
  header{
    padding:64px 20px 40px;
    max-width:880px;
    margin:0 auto;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--amber);
    letter-spacing:0.12em;
    text-transform:uppercase;
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:18px;
  }
  .eyebrow::before{
    content:"";
    width:7px;height:7px;border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 0 3px rgba(242,169,59,0.18);
  }
  h1{
    font-family:'JetBrains Mono', monospace;
    font-weight:800;
    font-size:clamp(32px, 6vw, 54px);
    line-height:1.05;
    margin:0 0 14px;
    letter-spacing:-0.02em;
  }
  h1 span{color:var(--muted);}
  header p{
    color:var(--muted);
    font-size:16px;
    max-width:520px;
    line-height:1.6;
    margin:0 0 22px;
  }
  .meta-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
  }
  .meta-row a, .meta-row span{
    border:1px solid var(--line);
    padding:6px 12px;
    border-radius:20px;
    color:var(--text);
    text-decoration:none;
    background:var(--surface);
  }
  .meta-row .stat-num{color:var(--amber); font-weight:700;}

  /* ===== LOG STREAM ===== */
  main{
    max-width:880px;
    margin:0 auto;
    padding:48px 20px 100px;
  }
  .stream-label{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--muted);
    letter-spacing:0.1em;
    text-transform:uppercase;
    margin:0 0 24px;
    padding-left:2px;
  }

  .entry{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    margin-bottom:22px;
    overflow:hidden;
    animation:rise 0.5s ease both;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
  }

  .term-bar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 14px;
    background:var(--surface-2);
    border-bottom:1px solid var(--line);
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    color:var(--muted);
  }
  .dots{display:flex; gap:6px; flex-shrink:0;}
  .dots span{width:9px; height:9px; border-radius:50%; display:block;}
  .dots span:nth-child(1){background:#4a5872;}
  .dots span:nth-child(2){background:#4a5872;}
  .dots span:nth-child(3){background:#4a5872;}
  .term-path{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .term-path b{color:var(--cyan); font-weight:500;}

  .entry-body{padding:18px;}
  .entry-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    margin-bottom:6px;
  }
  .entry-title{
    font-size:17px;
    font-weight:600;
    margin:0;
  }
  .badge{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:3px 9px;
    border-radius:5px;
    flex-shrink:0;
    white-space:nowrap;
  }
  .badge.photo{color:var(--amber); background:rgba(242,169,59,0.12); border:1px solid rgba(242,169,59,0.3);}
  .badge.video{color:var(--cyan); background:rgba(79,176,198,0.12); border:1px solid rgba(79,176,198,0.3);}

  .entry-desc{
    color:var(--muted);
    font-size:14px;
    line-height:1.55;
    margin:0 0 14px;
  }
  .entry-date{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    color:var(--muted);
    margin-bottom:14px;
    display:block;
  }

  .media-frame{
    border-radius:7px;
    overflow:hidden;
    border:1px solid var(--line);
    background:#000;
  }
  .media-frame img{
    width:100%; display:block; max-height:520px; object-fit:contain; background:#050810;
  }
  .media-frame video{
    width:100%; display:block; max-height:520px; background:#000;
  }
  .media-frame iframe{
    width:100%; aspect-ratio:16/9; display:block; border:0;
  }

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    border:1px dashed var(--line);
    border-radius:var(--radius);
  }

  footer{
    max-width:880px;
    margin:0 auto;
    padding:0 20px 60px;
    color:var(--muted);
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    text-align:center;
  }

  @media (max-width:600px){
    header{padding:44px 16px 32px;}
    main{padding:36px 16px 80px;}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Verified Log</div>
  <h1>Work Proof</h1>
  <p>A running record of things I've actually built and shipped. Every entry below is a screenshot or clip pulled straight from a live project, not a mockup.</p>
  <div class="meta-row">
    <span><span class="stat-num" id="entryCount">0</span> entries logged</span>
    <a href="https://t.me/Wipeeye" target="_blank" rel="noopener">@Wipeeye</a>
  </div>
</header>

<main>
  <p class="stream-label">$ tail -f proof.log</p>
  <div id="stream"></div>
</main>

<footer>
  @Wipeeye © <span id="year"></span> — built from Termux, deployed on GitHub Pages.
</footer>
